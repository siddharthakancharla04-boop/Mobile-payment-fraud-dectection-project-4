<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mobile Fraud Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .safe {
            background: #d4edda;
            color: #155724;
        }

        .fraud {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Mobile Fraud Detection</h2>

        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount">

        <label>Old Balance (Sender)</label>
        <input type="number" id="oldbalanceOrg">

        <label>New Balance (Sender)</label>
        <input type="number" id="newbalanceOrig">

        <label>Old Balance (Receiver)</label>
        <input type="number" id="oldbalanceDest">

        <label>New Balance (Receiver)</label>
        <input type="number" id="newbalanceDest">

        <label>Transaction Type</label>
        <select id="transaction_type">
            <option value="0">PAYMENT</option>
            <option value="1">TRANSFER</option>
            <option value="2">CASH_OUT</option>
            <option value="3">DEBIT</option>
            <option value="4">CASH_IN</option>
        </select>

        <button onclick="predict()">Predict</button>

        <div id="result"></div>
    </div>

    <script>
        async function predict() {
            const data = {
                amount: parseFloat(document.getElementById("amount").value),
                oldbalanceOrg: parseFloat(document.getElementById("oldbalanceOrg").value),
                newbalanceOrig: parseFloat(document.getElementById("newbalanceOrig").value),
                oldbalanceDest: parseFloat(document.getElementById("oldbalanceDest").value),
                newbalanceDest: parseFloat(document.getElementById("newbalanceDest").value),
                transaction_type: parseInt(document.getElementById("transaction_type").value)
            };

            const response = await fetch("/predict/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            const resultDiv = document.getElementById("result");

            if (result.prediction.includes("Fraud")) {
                resultDiv.className = "result fraud";
            } else {
                resultDiv.className = "result safe";
            }

            resultDiv.innerHTML = `
        ${result.prediction} <br>
        Probability: ${result.fraud_probability}
    `;
        }
    </script>

</body>

</html>
